name: "📦🚀 cryptography"

on:
  push:
    branches:
    - long_lived/**
    - main
    - release/**
    tags:
    - '**'
  pull_request:
    branches:
    - '**'
  workflow_dispatch:
    inputs:
      version:
        description: "The version to build"
        required: false
        default: "49.0.0"
        type: string

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}-${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/long_lived/')) && github.sha || '' }}
    cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  default_version: "49.0.0"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: 🍎 📦 Build Intel ${{ matrix.abi.name }}
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        abi:
          - name: cp310-abi3
            python: "3.10"
            cibw-build: cp310-*
            abi-feature: pyo3/abi3-py310
            cibuildwheel: cibuildwheel==2.23.3
          - name: cp311-abi3
            python: "3.11"
            cibw-build: cp311-*
            abi-feature: pyo3/abi3-py311
            cibuildwheel: cibuildwheel==3.2.1
    env:
      FILE_NAME: macos-intel-${{ matrix.abi.name }}
      OPENSSL_DIR: ${{ github.workspace }}/openssl

    steps:
      - name: Clean workspace
        uses: Chia-Network/actions/clean-workspace@main

      - uses: Chia-Network/actions/setup-python@main
        with:
          python-version: ${{ matrix.abi.python }}

      - uses: Chia-Network/actions/create-venv@main
        id: create-venv

      - uses: Chia-Network/actions/activate-venv@main
        with:
          directories: ${{ steps.create-venv.outputs.activate-venv-directories }}

      - name: Get source dist
        run: |
          pip download --no-deps --no-binary :all: --dest packages cryptography==${{ github.event.inputs.version || env.default_version }}

      - name: Untar
        run: |
          tar -xvzf packages/cryptography-*
          mv cryptography-* source

      - name: Install Rust
        run: |
          if ! command -v rustc >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          rustc --version

      - name: Get OpenSSL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          run_id="$(gh run list -R pyca/infra --workflow=build-macos-openssl.yml --branch=main --limit=20 --json databaseId,conclusion -q '.[] | select(.conclusion=="success") | .databaseId' | head -1)"
          if [ -z "$run_id" ]; then
            echo "No successful OpenSSL build run found in pyca/infra"
            exit 1
          fi
          gh run download -R pyca/infra "$run_id" -n openssl-macos-x86-64 -D openssl

      - name: Install tools
        run: |
          pip install ${{ matrix.abi.cibuildwheel }}

      - name: Build and test
        env:
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BUILD: ${{ matrix.abi.cibw-build }}
          CIBW_CONFIG_SETTINGS: build-args=--features=${{ matrix.abi.abi-feature }}
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15 OPENSSL_DIR=${{ env.OPENSSL_DIR }} OPENSSL_STATIC=1
          CIBW_PRERELEASE_PYTHONS: True
          CIBW_SKIP: "cp31?t-* *-manylinux_i686 *-win32 *-musllinux_*"
          CIBW_TEST_REQUIRES: "cffi>=2.0.0"
        run: |
          cibuildwheel source --output-dir dist

      - uses: chia-network/actions/create-venv@main
        id: create-test-venv

      - uses: chia-network/actions/activate-venv@main
        with:
          directories: ${{ steps.create-test-venv.outputs.activate-venv-directories }}

      - name: Install
        run: |
          ls -la dist
          python -m pip install --find-links dist --only-binary :all: cryptography

      - name: Import
        run: |
          python -c 'import cryptography; print(cryptography)'

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: wheel-${{ env.FILE_NAME }}
          path: ./dist
          if-no-files-found: error

  upload:
    name: 🚀 Upload
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/upload
        with:
          package_name: cryptography
          artifact_name: wheel
          dry_run: ${{ github.event_name != 'workflow_dispatch' }}
          vault_url: ${{ secrets.VAULT_URL }}
          aws_account: ${{ secrets.CHIA_AWS_ACCOUNT_ID }}
