name: "📦🚀 cryptography"

on:
  push:
    branches:
    - long_lived/**
    - main
    - release/**
    tags:
    - '**'
  pull_request:
    branches:
    - '**'
  workflow_dispatch:
    inputs:
      version:
        description: "The version to build"
        required: false
        default: "49.0.0"
        type: string

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}-${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/long_lived/')) && github.sha || '' }}
    cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  default_version: "49.0.0"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: 🍎 📦 Build Intel ${{ matrix.abi.name }}
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        abi:
          - name: cp310-abi3
            python: "3.10"
            cibw-build: cp310-*
            abi-feature: pyo3/abi3-py310
            cibuildwheel: cibuildwheel==2.23.3
          - name: cp311-abi3
            python: "3.11"
            cibw-build: cp311-*
            abi-feature: pyo3/abi3-py311
            cibuildwheel: cibuildwheel==3.2.1
    env:
      FILE_NAME: macos-intel-${{ matrix.abi.name }}
      OPENSSL_DIR: ${{ github.workspace }}/openssl

    steps:
      - name: Clean workspace
        uses: Chia-Network/actions/clean-workspace@main

      - uses: Chia-Network/actions/setup-python@main
        with:
          python-version: ${{ matrix.abi.python }}

      - uses: Chia-Network/actions/create-venv@main
        id: create-venv

      - uses: Chia-Network/actions/activate-venv@main
        with:
          directories: ${{ steps.create-venv.outputs.activate-venv-directories }}

      - name: Get source dist
        run: |
          pip download --no-deps --no-binary :all: --dest packages cryptography==${{ github.event.inputs.version || env.default_version }}

      - name: Untar
        run: |
          tar -xvzf packages/cryptography-*
          mv cryptography-* source

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          repo: pyca/infra
          workflow: build-macos-openssl.yml
          branch: main
          workflow_conclusion: success
          name: openssl-macos-x86-64
          path: openssl
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          pip install ${{ matrix.abi.cibuildwheel }}

      - name: Build and test
        env:
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BUILD: ${{ matrix.abi.cibw-build }}
          CIBW_CONFIG_SETTINGS: build-args=--features=${{ matrix.abi.abi-feature }}
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15 OPENSSL_DIR=${{ env.OPENSSL_DIR }} OPENSSL_STATIC=1
          CIBW_PRERELEASE_PYTHONS: True
          CIBW_SKIP: "cp31?t-* *-manylinux_i686 *-win32 *-musllinux_*"
          CIBW_TEST_REQUIRES: "cffi>=2.0.0 cryptography_vectors==${{ github.event.inputs.version || env.default_version }} pytest>=7.4.0 pytest-benchmark>=4.0 pretend"
          CIBW_TEST_COMMAND: "pytest {project}/tests --rootdir={project} --ignore={project}/tests/bench"
        run: |
          cibuildwheel source --output-dir dist

      - uses: chia-network/actions/create-venv@main
        id: create-test-venv

      - uses: chia-network/actions/activate-venv@main
        with:
          directories: ${{ steps.create-test-venv.outputs.activate-venv-directories }}

      - name: Install
        run: |
          ls -la dist
          python -m pip install --find-links dist --only-binary :all: cryptography

      - name: Verify OpenSSL linkage
        run: |
          set -eo pipefail
          so="$(find "$(python -c 'import cryptography, os; print(os.path.dirname(cryptography.__file__))')" -path '*/hazmat/bindings/*.so' | head -1)"
          echo "Extension: $so"
          echo "Dynamic libraries:"
          otool -L "$so"
          if otool -L "$so" | grep -E 'libssl|libcrypto'; then
            echo "ERROR: OpenSSL appears to be dynamically linked"
            exit 1
          fi
          python <<'EOF'
          import os
          import re
          import sys
          from pathlib import Path

          from cryptography.hazmat.backends.openssl.backend import backend

          header = (Path(os.environ["OPENSSL_DIR"]) / "include/openssl/opensslv.h").read_text()
          expected = re.search(r'#define OPENSSL_VERSION_TEXT\s+"([^"]+)"', header).group(1)
          linked = backend._ffi.string(backend._lib.OPENSSL_VERSION_TEXT).decode("ascii")
          print(f"Expected OpenSSL: {expected}")
          print(f"Runtime OpenSSL:  {linked}")
          if linked != expected:
              print(f"OpenSSL version mismatch: expected {expected!r}, got {linked!r}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Import
        run: |
          python -c 'import cryptography; print(cryptography)'

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: wheel-${{ env.FILE_NAME }}
          path: ./dist
          if-no-files-found: error

  upload:
    name: 🚀 Upload
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/upload
        with:
          package_name: cryptography
          artifact_name: wheel
          dry_run: ${{ github.event_name != 'workflow_dispatch' }}
          vault_url: ${{ secrets.VAULT_URL }}
          aws_account: ${{ secrets.CHIA_AWS_ACCOUNT_ID }}
