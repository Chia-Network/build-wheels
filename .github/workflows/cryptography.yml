name: "📦🚀 cryptography"

on:
  push:
    branches:
    - long_lived/**
    - main
    - release/**
    tags:
    - '**'
  pull_request:
    branches:
    - '**'
  workflow_dispatch:
    inputs:
      version:
        description: "The version to build"
        required: true

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}-${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/long_lived/')) && github.sha || '' }}
    cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  default_version: "49.0.0"

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  build:
    name: 🍎 📦 Build Intel ${{ matrix.python.major-dot-minor }}
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        python:
          - major-dot-minor: "3.10"
            cibw-build: "cp310-*"
            matrix: "3.10"
          - major-dot-minor: "3.11"
            cibw-build: "cp311-*"
            matrix: "3.11"
          - major-dot-minor: "3.12"
            cibw-build: "cp312-*"
            matrix: "3.12"
          - major-dot-minor: "3.13"
            cibw-build: "cp313-*"
            matrix: "3.13"
          - major-dot-minor: "3.14"
            cibw-build: "cp314-*"
            matrix: "3.14"

    env:
      FILE_NAME: macos-intel-${{ matrix.python.major-dot-minor }}
      OPENSSL_DIR: ${{ github.workspace }}/openssl

    steps:
      - name: Clean workspace
        uses: Chia-Network/actions/clean-workspace@main

      - uses: Chia-Network/actions/setup-python@main
        with:
          python-version: ${{ matrix.python.major-dot-minor }}

      - uses: Chia-Network/actions/create-venv@main
        id: create-venv

      - uses: Chia-Network/actions/activate-venv@main
        with:
          directories: ${{ steps.create-venv.outputs.activate-venv-directories }}

      - name: Get source dist
        run: |
          pip download --no-deps --no-binary :all: --dest packages cryptography==${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || env.default_version }}

      - name: Untar
        run: |
          tar -xvzf packages/cryptography-*
          mv cryptography-* source

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Get OpenSSL
        uses: dawidd6/action-download-artifact@v11
        with:
          repo: pyca/infra
          workflow: build-macos-openssl.yml
          branch: main
          workflow_conclusion: success
          name: openssl-macos-x86-64
          path: openssl
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        if: matrix.python.matrix == '3.10'
        run: |
          pip install cibuildwheel==2.23.3

      - name: Install tools
        if: matrix.python.matrix != '3.10'
        run: |
          pip install cibuildwheel==3.2.1

      - name: Build and test
        env:
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BUILD: ${{ matrix.python.cibw-build }}
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15 OPENSSL_DIR=${{ env.OPENSSL_DIR }} OPENSSL_STATIC=1
          CIBW_PRERELEASE_PYTHONS: True
          CIBW_SKIP: "cp31?t-* *-manylinux_i686 *-win32 *-musllinux_*"
        run: |
          cibuildwheel source --output-dir dist

      - uses: chia-network/actions/create-venv@main
        id: create-test-venv

      - uses: chia-network/actions/activate-venv@main
        with:
          directories: ${{ steps.create-test-venv.outputs.activate-venv-directories }}

      - name: Install
        run: |
          ls -la dist
          python -m pip install --no-index --only-binary :all: --find-links dist cryptography

      - name: Import
        run: |
          python -c 'import cryptography; print(cryptography)'

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: wheel-${{ env.FILE_NAME }}
          path: ./dist
          if-no-files-found: error

  upload:
    name: 🚀 Upload
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/upload
        with:
          package_name: cryptography
          artifact_name: wheel
          dry_run: ${{ github.event_name != 'workflow_dispatch' }}
          vault_url: ${{ secrets.VAULT_URL }}
          aws_account: ${{ secrets.CHIA_AWS_ACCOUNT_ID }}
